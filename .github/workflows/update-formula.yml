name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    name: Update Formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        env:
          TAG: ${{ github.event.client_payload.tag }}
          VERSION: ${{ github.event.client_payload.version }}
          SHA256_ARM: ${{ github.event.client_payload.sha256_arm }}
          SHA256_X86: ${{ github.event.client_payload.sha256_x86 }}
        run: |
          sed -i \
            -e "s/version \".*\"/version \"${VERSION}\"/" \
            -e "s|releases/download/v[^/]*/writerslogic-v[^-]*-aarch64|releases/download/${TAG}/writerslogic-${TAG}-aarch64|" \
            -e "s|releases/download/v[^/]*/writerslogic-v[^-]*-x86_64|releases/download/${TAG}/writerslogic-${TAG}-x86_64|" \
            Formula/writerslogic.rb
          # Update ARM sha256 (first occurrence)
          sed -i "0,/sha256 \"[a-f0-9]\{64\}\"/s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${SHA256_ARM}\"/" Formula/writerslogic.rb
          # Update x86 sha256 (second occurrence)
          awk -v hash="${SHA256_X86}" '/sha256 "[a-f0-9]{64}"/{c++;if(c==2){sub(/sha256 "[a-f0-9]{64}"/,"sha256 \""hash"\"")}}1' Formula/writerslogic.rb > /tmp/formula.rb && mv /tmp/formula.rb Formula/writerslogic.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/writerslogic.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update writerslogic to ${{ github.event.client_payload.version }}"
          git push
