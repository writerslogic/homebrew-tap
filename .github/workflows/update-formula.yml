name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    name: Update Formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        env:
          TAG: ${{ github.event.client_payload.tag }}
          VERSION: ${{ github.event.client_payload.version }}
          SHA256_ARM: ${{ github.event.client_payload.sha256_arm }}
          SHA256_X86: ${{ github.event.client_payload.sha256_x86 }}
        run: |
          cat > Formula/writerslogic.rb << FORMULA
          # Homebrew formula for WritersLogic CLI
          # To install: brew install writerslogic/tap/writerslogic

          class Writerslogic < Formula
            desc "Cryptographic authorship witnessing for writers and creators"
            homepage "https://writerslogic.com"
            version "${VERSION}"
            license "AGPL-3.0-only"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/writerslogic/witnessd/releases/download/${TAG}/writerslogic-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA256_ARM}"
              else
                url "https://github.com/writerslogic/witnessd/releases/download/${TAG}/writerslogic-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA256_X86}"
              end
            end

            def install
              bin.install "wld"
              bin.install "writerslogic-native-messaging-host" if File.exist?("writerslogic-native-messaging-host")
            end

            def caveats
              <<~EOS
                To get started:

                  1. Initialize WritersLogic:
                     wld init

                  2. Calibrate VDF for your machine:
                     wld calibrate

                  3. Create your first checkpoint:
                     wld commit your-document.md -m "Initial draft"

                For more information, see:
                  https://writerslogic.com
              EOS
            end

            test do
              assert_match "wld_cli", shell_output("#{bin}/wld --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/writerslogic.rb
          git commit -m "chore: update writerslogic to ${{ github.event.client_payload.version }}"
          git push
